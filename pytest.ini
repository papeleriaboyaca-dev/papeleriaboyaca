[pytest]
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: tests unitarios con mocks (sin BD real)
    integration: tests de integración (requieren BD)
    slow: tests lentos
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
